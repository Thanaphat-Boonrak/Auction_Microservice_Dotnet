apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-deployment
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      name: rabbitmq
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq-container
          image: rabbitmq:3-management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbit-secret
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbit-secret
                  key: password
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 15672
              name: rbmq-mgmt-port
              protocol: TCP
            - containerPort: 5672
              name: rbmq-msg-port
          volumeMounts:
            - mountPath: /var/lib/rabbit
              name: rabbitdata
      restartPolicy: Always
      volumes:
        - name: rabbitdata
          persistentVolumeClaim:
            claimName: rabbit-claim
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-nodeport
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 15672
      targetPort: 15672
      nodePort: 30002
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-clusterip
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
  type: ClusterIP 