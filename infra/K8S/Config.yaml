apiVersion: v1
kind: ConfigMap
metadata:
  name: auction-service-config
data:
  ASPNETCORE_URLS: http://+:80;http://+:7777
  RabbitMQ__Host: rabbitmq-clusterip
  IdentityServiceUrl: http://identity-service-clusterip
  Kestrel__Endpoints__Grpc__Protocols: Http2
  Kestrel__Endpoints__Grpc__Url: http://+:7777
  Kestrel__Endpoints__WebApi__Protocols: Http1
  Kestrel__Endpoints__WebApi__Url: http://+:80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: search-service-config
data:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: http://+:80
  RabbitMQ__Host: rabbitmq-clusterip
  AuctionServiceUrl: http://auction-service-clusterip
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bids-service-config
data:
  ASPNETCORE_URLS: http://+:80
  RabbitMQ__Host: rabbitmq-clusterip
  ConnectionStrings__BidDbConnection: mongodb://root:mongopw@mongo-clusterip
  GrpcAuction: http://auction-service-clusterip:7777
  IdentityServiceUrl: http://identity-service-clusterip
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: noti-service-config
data:
  ASPNETCORE_URLS: http://+:80
  RabbitMQ__Host: rabbitmq-clusterip
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-service-config
data:
  ASPNETCORE_URLS: http://+:80
  RabbitMQ__Host: rabbitmq-clusterip
  RabbitMQ__Username: rabbit
  RabbitMQ__Password: rabbitpw
  ClientApp: https://app.thanaphat2005.local
  IdentityServiceUrl: http://identity-service-clusterip
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
data:
  ClientApp: https://app.thanaphat2005.local
  IssuerUri: https://id.thanaphat2005.local
  ASPNETCORE_URLS: http://+:80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-service-config
data:
  API_URL: http://gateway-service-clusterip/
  ID_URL_INTERNAL: http://identity-service-clusterip
  ID_URL: https://id.thanaphat2005.local
  AUTH_URL: https://app.thanaphat2005.local
  AUTH_URL_INTERNAL: http://webapp-clusterip:3000