apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
spec:
  tls:
    - hosts:
        - app.thanaphat2005.local
        - api.thanaphat2005.local
        - id.thanaphat2005.local
      secretName: christie-app-tls
  ingressClassName: nginx
  rules:
    - host: app.thanaphat2005.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp-clusterip
                port:
                  number: 3000
    - host: api.thanaphat2005.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service-clusterip
                port:
                  number: 80
    - host: id.thanaphat2005.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: identity-service-clusterip
                port:
                  number: 80