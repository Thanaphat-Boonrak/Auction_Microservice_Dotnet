name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: "thanaphat2005/auction-service"
            path: "src/AuctionService"
          - name: "thanaphat2005/bids-service"
            path: "src/BiddingService"
          - name: "thanaphat2005/gateway-service"
            path: "src/GatewayService"
          - name: "thanaphat2005/identity-service"
            path: "src/IdentityService"
          - name: "thanaphat2005/notification-service"
            path: "src/NotificationService"
          - name: "thanaphat2005/search-service"
            path: "src/SearchService"
          - name: "thanaphat2005/web-app"
            path: "frontend/web-app"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: ${{ matrix.service.name }}:latest