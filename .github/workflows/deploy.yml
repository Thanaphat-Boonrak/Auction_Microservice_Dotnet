name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: "thanaphat2005/auction-service"
            path: "src/AuctionService"
          - name: "thanaphat2005/bids-service"
            path: "src/BiddingService"
          - name: "thanaphat2005/gateway-service"
            path: "src/GatewayService"
          - name: "thanaphat2005/identity-service"
            path: "src/IdentityService"
          - name: "thanaphat2005/notification-service"
            path: "src/NotificationService"
          - name: "thanaphat2005/search-service"
            path: "src/SearchService"
          - name: "thanaphat2005/web-app"
            path: "frontend/web-app"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 

      - name: Check for changes in service path
        id: check_changes 
        run: |
          if git diff --quiet HEAD^ HEAD ${{ matrix.service.path }}; then
            echo "No changes in ${{ matrix.service.path }}. Skipping build"
            echo "continue=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in ${{ matrix.service.path }}. Proceeding with build"
            echo "continue=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker buildx
        if: steps.check_changes.outputs.continue == 'true' 
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker
        if: steps.check_changes.outputs.continue == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push docker image
        if: steps.check_changes.outputs.continue == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ matrix.service.name }}:latest
  
  apply-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{secrets.DIGITALOCEAN_ACCESS_TOKEN}}
          
      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save k8s-1-36-0-do-2-sgp1-1784035478219
      
      - name: Apply the K8S deployments
        run: kubectl apply -f infra/K8S && kubectl apply -f infra/prod-k8s
          